version: 2

# Dependabot config.
#
# History: the previous config used a single `patterns: ["*"]` group per
# ecosystem, which let dependabot batch every update into one monster PR.
# The dependabot audit (see jagkaran/mern-ecommerce#28) split the
# frontend batch into 9–10 smaller PRs; the root cause was here.
#
# Each group now stays small (≤ ~8 packages) and is semantically scoped
# so a reviewer can assess the change in one sitting. Major bumps still
# flow through as their own PR — they're the ones that need source edits
# and a real test gate.
#
# `ignore` rules:
#   - `@mui/lab` is pinned to a 2024-05 dev prerelease in the npm registry;
#     no upstream maintainer. Ignore until a stable v6+ exists or we
#     delete the dependency.
#   - `@mui/styles` was deprecated in MUI v5 and removed in MUI v7. The
#     codebase has 2 callers that will be migrated to `sx` prop under
#     F2 of the roadmap. Don't let dependabot re-introduce it via an
#     upgrade PR.
#   - `react` / `react-dom` are locked to v18 until the `react-scripts`
#     exit plan (Vite or Next.js) lands. react-scripts@5.0.1 is EOL and
#     does not support React 19.

updates:
  # ─── Backend (root package.json) ──────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      # Safe bumps land together as one PR.
      backend-patch-and-minor:
        update-types: ["minor", "patch"]
      # Major bumps get their own PR so each can carry its source edits
      # and test gate. No batching across majors.
      backend-major:
        update-types: ["major"]

  # ─── Frontend (frontend/package.json) ─────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      frontend-patch-and-minor:
        update-types: ["minor", "patch"]

  # ─── GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"

# Per-package ignore rules. `dependency-name` uses the npm name; `version`
# patterns use `*` for any. These are evaluated by dependabot on each
# run; matching updates are skipped.
#
# `update-types` lets us ignore majors but still allow patches/minors for
# the same package.
ignore:
  - dependency-name: "@mui/lab"
    # Ignore entirely — stale prerelease, no upstream maintainer.
  - dependency-name: "@mui/styles"
    # Deprecated; the roadmap removes it. Block any re-introduction.
  - dependency-name: "react"
    # Locked to v18 until react-scripts exit plan lands.
    versions: ["19.x", "20.x", "21.x"]
  - dependency-name: "react-dom"
    # Same rationale as `react`.
    versions: ["19.x", "20.x", "21.x"]
  - dependency-name: "react-scripts"
    # EOL; the roadmap removes it.
