version: 2

# Dependabot config.
#
# History: the previous config used a single `patterns: ["*"]` group per
# ecosystem, which let dependabot batch every update into one monster PR.
# The dependabot audit (see jagkaran/mern-ecommerce#28) split the
# frontend batch into 9–10 smaller PRs; the root cause was here.
#
# Each group now stays small (≤ ~8 packages) and is semantically scoped
# so a reviewer can assess the change in one sitting. Major bumps still
# flow through as their own PR — they're the ones that need source edits
# and a real test gate.
#
# `ignore` rules (per-ecosystem, since Dependabot v2 requires ignore at
# the updates[] level — not top-level):
#   - `@mui/lab` is pinned to a 2024-05 dev prerelease in the npm registry;
#     no upstream maintainer. Ignore until a stable v6+ exists or we
#     delete the dependency.
#   - `@mui/styles` was deprecated in MUI v5 and removed in MUI v7. The
#     codebase has 2 callers that will be migrated to `sx` prop under
#     F2 of the roadmap. Don't let dependabot re-introduce it via an
#     upgrade PR.
#   - `react` / `react-dom` are locked to v18 until the `react-scripts`
#     exit plan (Vite or Next.js) lands. react-scripts@5.0.1 is EOL and
#     does not support React 19.
#   - `react-scripts` is ignored entirely (EOL; roadmap removes it in F8).

updates:
  # ─── Backend (root package.json) ──────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      # Safe bumps land together as one PR.
      backend-patch-and-minor:
        update-types: ["minor", "patch"]
      # Major bumps get their own PR so each can carry its source edits
      # and test gate. No batching across majors.
      backend-major:
        update-types: ["major"]

  # ─── Frontend (frontend/package.json) ─────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      frontend-patch-and-minor:
        update-types: ["minor", "patch"]
    # Per-package ignore rules. `dependency-name` uses the npm name;
    # `version` patterns use `*` for any. Matching updates are skipped.
    ignore:
      - dependency-name: "@mui/lab"
        # Ignore entirely — stale prerelease, no upstream maintainer.
      - dependency-name: "@mui/styles"
        # Deprecated; the roadmap removes it. Block re-introduction.
      - dependency-name: "react"
        # Locked to v18 until react-scripts exit plan lands.
        versions: ["19.x", "20.x", "21.x"]
      - dependency-name: "react-dom"
        # Locked to v18 (now live). Bump to v19+ blocks on React 19
        # codemod (no upgrade plan yet).
        versions: ["19.x", "20.x", "21.x"]
      - dependency-name: "react-scripts"
        # EOL; the roadmap removes it.
      - dependency-name: "web-vitals"
        # Removed: declared but zero source usage. Re-add when needed.
      # F8 unblock — Vite + React 18 shipped in PR #60. react-router-dom v7
      # data router migration is F11 (also shipped in PR #62). @mui/material
      # and @mui/icons-material v6+ work on React 18. react-redux v8 works
      # on React 18. All four packages can now receive dependabot bumps.
      #
      # (Previous entries for react-router-dom v7+, react-router v7+,
      #  @mui/material v6+, @mui/icons-material v6+, react-redux v8+
      #  deleted.)
      #
      # F7 unblock — F8 landed React 18; testing-library trio (and friends)
      # can now upgrade. The ignores below are removed; dependabot will
      # open PRs for any available major/minor/patch releases.
      #
      # (Previous entries for @testing-library/react v12+, jest-dom v6+,
      #  user-event v14+ deleted.)
      #
      # Still ignored because no React 18-compatible release exists yet:
      # (none currently)

  # ─── GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
