# Task 2.1 — CI/CD Pipeline
# Runs on every push and pull-request to master.
# Jobs:  lint → test → audit
# Deployment (Render auto-deploy) is triggered on merge via render.yaml autoDeploy: true.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Lint backend (eslint)
        run: npm run lint --if-present

      - name: Lint frontend (eslint)
        run: npm run lint --prefix frontend --if-present

  # ─── 2. Backend Unit + Integration Tests ──────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint

    # Spin up a real MongoDB instance for the test suite
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_URI: mongodb://localhost:27017/mern-ecommerce-test
      JWT_SECRET: ci-test-jwt-secret-do-not-use-in-prod
      JWT_EXPIRE: 1d
      CLOUDINARY_NAME: placeholder
      CLOUDINARY_API_KEY: placeholder
      CLOUDINARY_API_SECRET: placeholder
      STRIPE_SECRET_KEY: placeholder
      SMTP_HOST: placeholder
      SMTP_PORT: 465
      SMTP_SERVICE: gmail
      SMTP_MAIL: placeholder@example.com
      SMTP_PASSWORD: placeholder

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --forceExit --testTimeout=30000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── 3. Security Audit ────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        run: npm ci --prefix frontend

      # Task 10.3 — fail CI if any HIGH or CRITICAL vulnerability found
      - name: Audit backend dependencies
        run: npm audit --audit-level=high

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high --prefix frontend
