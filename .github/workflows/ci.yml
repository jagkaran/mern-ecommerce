name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          # Repo has two lockfiles (root + frontend/) — cache must be invalidated
          # by changes to either, otherwise stale installs after frontend bumps.
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm ci
      - run: npm install --legacy-peer-deps --prefix frontend
      - run: npm run lint --if-present
      - run: npm run lint --prefix frontend --if-present

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      # Node 18 dropped — EOL April 2025. Matrix now matches .nvmrc + engines.node ">=20".
      matrix:
        node-version: [20, 22]
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-do-not-use-in-prod
      JWT_EXPIRE: 1d
      CLOUDINARY_NAME: placeholder
      CLOUDINARY_API_KEY: placeholder
      CLOUDINARY_API_SECRET: placeholder
      SMTP_HOST: placeholder
      SMTP_PORT: 465
      SMTP_SERVICE: gmail
      SMTP_MAIL: placeholder@example.com
      SMTP_PASSWORD: placeholder
      # Deterministic mongodb-memory-server downloads
      MONGOMS_VERSION: 7.0.14
      MONGOMS_DISTRO: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test -- --coverage --forceExit --testTimeout=30000
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm ci
      - run: npm install --legacy-peer-deps --prefix frontend
      - run: npm audit --audit-level=high
      - run: npm audit --audit-level=high --prefix frontend
        continue-on-error: true

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    # Was: needs: lint. Independent of lint — run in parallel, save wall-clock.
    steps:
      - uses: actions/checkout@v7
        with:
          # gitleaks diffs against the parent commit; shallow clones (depth=1)
          # don't have the parent, so the scan fails with "unknown revision".
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the binary. NO leading 'v' — the action prepends one,
          # so 'v8.21.2' becomes 'vv8.21.2' (404 on the release URL).
          GITLEAKS_VERSION: 8.21.2
