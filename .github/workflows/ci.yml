name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm install --legacy-peer-deps --prefix frontend
      - run: npm run lint --if-present
      - run: npm run lint --prefix frontend --if-present

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20, 22]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          NODE_ENV: test
          DB_URI: mongodb://localhost:27017/mern-ecommerce-test
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-prod
          JWT_EXPIRE: 1d
          CLOUDINARY_NAME: placeholder
          CLOUDINARY_API_KEY: placeholder
          CLOUDINARY_API_SECRET: placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          SMTP_HOST: placeholder
          SMTP_PORT: 465
          SMTP_SERVICE: gmail
          SMTP_MAIL: placeholder@example.com
          SMTP_PASSWORD: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test -- --coverage --forceExit --testTimeout=30000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm install --legacy-peer-deps --prefix frontend
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json', 'frontend/package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e:ci
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm install --legacy-peer-deps --prefix frontend
      - run: npm audit --audit-level=high
      - run: npm audit --audit-level=high --prefix frontend
        continue-on-error: true

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: gitleaks/gitleaks@v8.30.1
