# Pre-commit hygiene for MERN repo.
# Install:  brew install pre-commit && pre-commit install
# Manual:   pre-commit run --all-files          # full repo (slower)
#           pre-commit run                       # staged files only
# Bypass:   git commit --no-verify               (emergencies only)
#
# Order is top-down: cheap stdlib hygiene first, then JS formatting, then
# lint. Anything that fails blocks the commit.
#
# ponytail: skipped husky / lint-staged (collide with `pre-commit install`),
# gitleaks (detect-private-key catches RSA/SSH; add gitleaks later if Stripe
# or Mongo URI leaks slip through), npm audit (CI-grade, too slow for a hook),
# and the jest hook here — `pre-commit run --all-files` swallows ~5s on a fast
# tree but Jest with `--findRelatedTests` needs filenames and `pass_filenames:
# false` strips them. Jest belongs in CI; keep it there.

repos:
  # ─── Stdlib hygiene ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        # backend/config/config.env uses .env syntax — keep this tight.
        args: [--allow-multiple-documents]
      - id: check-json
        # pre-commit scans the working dir, not git tree — exclude anything
        # gitignored that we don't want linted (launch configs, etc.).
        exclude: ^(frontend/.*\.json|\.vscode/|node_modules/)
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        # 500 KB hard cap. Bump to 5 MB and add `*.bin` to allowlist if you
        # need to track fixtures, otherwise rely on LFS for real assets.
        args: [--maxkb=500]
      - id: detect-private-key
        # Catches BEGIN RSA/OPENSSH/EC/PRIVATE blocks at diff-time. The Mongo
        # URI / STRIPE_SECRET_KEY case still needs gitleaks — see comment top.
      - id: mixed-line-ending
        args: [--fix=lf] # matches .prettierrc endOfLine: lf

  # ─── JS formatting & lint (uses your installed deps) ──────────────────
  - repo: local
    hooks:
      - id: prettier-check
        name: prettier --check (staged JS/JSON/MD/CSS)
        entry: npx prettier --check
        language: system
        files: \.(js|jsx|json|md|yml|yaml|css|scss)$
        exclude: ^frontend/(build|node_modules)/ # built assets / deps
        # .prettierignore + .gitignore filter node_modules, build, coverage.

      - id: eslint-backend
        name: eslint (backend only)
        # eslint.config.js scopes to backend/** — frontend intentionally skipped.
        # Uses `--no-warn-ignored` so check-json-style warnings don't pollute
        # output; only `error`-level findings fail the commit.
        entry: npx eslint --no-warn-ignored
        language: system
        files: ^backend/.*\.(js|jsx)$
        types: [file]

      - id: console-log-guard
        name: no console.log in staged backend/frontend src
        # Cheap regex grep. ESLint could do this; this runs even when ESLint
        # is bypassed and blocks accidental debug prints before they ship.
        # Exclude: seeder (CLI script — logging IS the job), test files
        # (legitimate debug output during tests).
        entry: bash -c '! grep -rnE "console\.(log|debug|info)" "$@"' --
        language: system
        pass_filenames: true
        files: ^(backend|frontend/src)/.*\.(js|jsx)$
        exclude: ^(backend/seeder\.js|.*/__tests__/.*|.*\.test\.(js|jsx))$
